name: Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            arch: x64
          - os: macos-14
            arch: arm64
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-24.04-arm
            arch: arm64
          - os: windows-latest
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: "latest"
      - name: Install deps
        run: pnpm install
      - name: Build workspace deps
        run: |
          pnpm --filter @cloudeval/shared build
          pnpm --filter @cloudeval/core build
      - name: Build executable (bun)
        shell: bash
        run: |
          mkdir -p packages/cli/dist/bin
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            bun build packages/cli/src/cli.tsx --compile --external react-devtools-core --outfile packages/cli/dist/bin/cloudeval.exe
          else
            bun build packages/cli/src/cli.tsx --compile --external react-devtools-core --outfile packages/cli/dist/bin/cloudeval
            mv packages/cli/dist/bin/cloudeval packages/cli/dist/bin/cloudeval-${{ matrix.arch }}
          fi
          node packages/cli/scripts/alias-executables.js
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: packages/cli/dist/bin/*
