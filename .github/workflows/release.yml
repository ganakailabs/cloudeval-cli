name: Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            targets: node18-macos-x64,node18-macos-arm64
          - os: ubuntu-latest
            targets: node18-linux-x64,node18-linux-arm64
          - os: windows-latest
            targets: node18-win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install deps
        run: pnpm install --shamefully-hoist
      - name: Build workspace deps
        run: |
          pnpm --filter @cloudeval/shared build
          pnpm --filter @cloudeval/core build
      - name: Build executable bundle
        run: pnpm --filter cloudeval-cli build:executable-bundle
      - name: Build executables
        shell: bash
        run: |
          pnpm --filter cloudeval-cli exec pkg dist/cli.executable.js \
            --targets "${{ matrix.targets }}" \
            --output dist/bin/cloudeval
          node packages/cli/scripts/alias-executables.js
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: packages/cli/dist/bin/*
