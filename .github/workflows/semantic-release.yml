name: Semantic Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.semantic.outputs.new_release_published }}
      tag: ${{ steps.semantic.outputs.new_release_git_tag }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: pnpm
      - name: Install deps
        run: pnpm install
      - name: Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 23
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-binaries:
    needs: release
    if: needs.release.outputs.published == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            platform: macos
            arch: x64
          - os: macos-14
            platform: macos
            arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - os: windows-latest
            platform: win
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v5.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: pnpm
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Test CLI
        run: pnpm -C packages/cli test
      - name: Lint CLI
        run: pnpm -C packages/cli lint
      - name: Build workspace deps
        run: |
          pnpm --filter @cloudeval/shared build
          pnpm --filter @cloudeval/core build
      - name: Build executable (bun)
        shell: bash
        run: |
          mkdir -p packages/cli/dist/bin
          node packages/cli/scripts/patch-yoga-wasm.js
          YOGA_WASM=$(node packages/cli/scripts/prepare-yoga-wasm.js)
          if [ "${{ matrix.platform }}" = "win" ]; then
            bun build packages/cli/src/cli.tsx --compile --outfile packages/cli/dist/bin/cloudeval-win-${{ matrix.arch }}.exe
          else
            bun build packages/cli/src/cli.tsx --compile --outfile packages/cli/dist/bin/cloudeval
            mv packages/cli/dist/bin/cloudeval packages/cli/dist/bin/cloudeval-${{ matrix.platform }}-${{ matrix.arch }}
          fi
          cp "$YOGA_WASM" packages/cli/dist/bin/yoga.wasm
          rm -f "$YOGA_WASM"
          node packages/cli/scripts/alias-executables.js
          if [ "${{ matrix.platform }}-${{ matrix.arch }}" != "linux-x64" ]; then
            rm -f packages/cli/dist/bin/yoga.wasm
          fi
      - name: Generate checksums
        shell: bash
        run: |
          cd packages/cli/dist/bin
          node - <<'NODE'
          const crypto = require("node:crypto");
          const fs = require("node:fs");
          for (const file of fs.readdirSync(".")) {
            if (file.endsWith(".sha256")) continue;
            const stat = fs.statSync(file);
            if (!stat.isFile()) continue;
            const hash = crypto.createHash("sha256").update(fs.readFileSync(file)).digest("hex");
            fs.writeFileSync(`${file}.sha256`, `${hash}  ${file}\n`);
          }
          NODE
      - name: Upload release assets
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          overwrite_files: true
          files: packages/cli/dist/bin/*
