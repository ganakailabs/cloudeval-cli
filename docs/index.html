<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CloudEval CLI</title>
    <style>
      body {
        background: #0b0f0a;
        color: #f4f7ed;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        margin: 0;
      }
      main {
        margin: 0 auto;
        max-width: 840px;
        padding: 64px 24px;
      }
      h1 {
        color: #b6f23c;
        font-size: clamp(36px, 8vw, 76px);
        letter-spacing: -0.08em;
        margin: 0 0 16px;
      }
      p {
        color: #c8d0bf;
        font-size: 18px;
        line-height: 1.6;
      }
      pre {
        background: #11170f;
        border: 1px solid #354125;
        border-radius: 14px;
        color: #f7ffcf;
        overflow-x: auto;
        padding: 18px;
      }
      a {
        color: #8be6ff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>CloudEval CLI</h1>
      <p>Install the CloudEval CLI with checksum-verified GitHub Release binaries.</p>
      <pre><code>curl -fsSL https://cli.cloudeval.ai/install.sh | bash</code></pre>
      <p>After install, run <code>cloudeval login</code> and <code>cloudeval chat</code>.</p>
      <p><a href="https://github.com/ganakailabs/cloudeval-cli/releases/latest">Latest release</a></p>
    </main>
  </body>
</html>
